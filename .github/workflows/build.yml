name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Remove problematic packages
        run: |
          flutter pub remove app_links || true
          flutter pub remove firebase_messaging || true
          flutter pub remove agora_rtc_engine || true

      - name: Create .env file
        run: |
          mkdir -p assets/env
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/env/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/env/.env
          echo "PAYSTACK_PUBLIC_KEY=${{ secrets.PAYSTACK_PUBLIC_KEY }}" >> assets/env/.env
          echo "FLUTTERWAVE_PUBLIC_KEY=${{ secrets.FLUTTERWAVE_PUBLIC_KEY }}" >> assets/env/.env
          echo "STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}" >> assets/env/.env
          echo "AGORA_APP_ID=${{ secrets.AGORA_APP_ID }}" >> assets/env/.env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> assets/env/.env
          echo "GOOGLE_TRANSLATE_API_KEY=${{ secrets.GOOGLE_TRANSLATE_API_KEY }}" >> assets/env/.env
          echo "INFURA_PROJECT_ID=${{ secrets.INFURA_PROJECT_ID }}" >> assets/env/.env
          echo "OPENSEA_API_KEY=${{ secrets.OPENSEA_API_KEY }}" >> assets/env/.env
          echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" >> assets/env/.env

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
